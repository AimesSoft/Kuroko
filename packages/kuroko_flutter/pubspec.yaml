name: kuroko_flutter
description: Flutter embedder glue for the Kuroko Rust media engine.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: KurokoFlutterPlugin
      macos:
        pluginClass: KurokoFlutterPlugin
